schema: spec-driven

context: |
  # Band Tools API

  Aplicação backend voltada para o gerenciamento de bandas musicais. Permite cadastrar e administrar bandas, membros, músicas, ensaios, eventos e demais recursos relacionados ao universo de bandas.

  ## Tech Stack
  - Runtime: Node.js com TypeScript
  - Framework: NestJS (com Fastify como plataforma HTTP)
  - ORM: TypeORM
  - Banco de dados: PostgreSQL
  - Documentação de API: Swagger / OpenAPI (@nestjs/swagger + @scalar/nestjs-api-reference)
  - Validação: class-validator + class-transformer
  - Testes: Jest (unitário + e2e com Supertest)
  - Linting/Formatação: ESLint + Prettier
  - Git hooks: Husky + Commitlint

  ## Arquitetura
  O projeto segue uma arquitetura em camadas inspirada em Clean Architecture / Domain-Driven Design:
  - `src/domain/` — Entidades e regras de negócio puras, sem dependência de frameworks
  - `src/application/` — Casos de uso (use cases) que orquestram a lógica de negócio
  - `src/infrastructure/` — Implementações concretas: banco de dados, migrations, repositórios TypeORM
  - `src/http/` — Controllers, middlewares e camada de entrada HTTP (NestJS)
  - `src/shared/` — Utilitários compartilhados: DTOs de comunicação, exceções, helpers, enums, interfaces

  ## Padrões de Projeto
  - **SOLID**: todos os princípios são aplicados — responsabilidade única por classe, aberto para extensão e fechado para modificação, substituição de Liskov, segregação de interfaces, inversão de dependência
  - **Repository Pattern**: acesso a dados abstraído por interfaces de repositório definidas no domínio e implementadas na camada de infraestrutura; casos de uso dependem apenas da interface, nunca do TypeORM diretamente
  - **Migrations**: toda alteração de schema do banco de dados é feita exclusivamente via migrations TypeORM versionadas em `src/infrastructure/database/migrations/`; nunca usar `synchronize: true` em produção; migrations são geradas via `npm run migration:generate -- --name=<nome>` e executadas via `npm run migration:run`
  - **Object Calisthenics**: regras de qualidade de código aplicadas — um nível de indentação por método, sem uso de `else`, wrapping de primitivos em tipos de domínio, coleções encapsuladas em classes próprias, limite de dois atributos por classe onde possível, sem abreviações em nomes

  ## Fluxo de Desenvolvimento
  O projeto adota **SDD (Specification-Driven Development)** combinado com **TDD (Test-Driven Development)**:

  1. **Spec first**: toda mudança começa com uma proposta e design documentados via OpenSpec antes de qualquer linha de código
  2. **Red**: escrever o teste que valida o comportamento esperado (falha inicialmente)
  3. **Green**: implementar o mínimo necessário para o teste passar
  4. **Refactor**: melhorar o código mantendo os testes verdes e respeitando SOLID + Object Calisthenics
  5. **Commit**: seguindo Conventional Commits apenas após todos os testes passarem

  ## Padrões e Convenções
  - Commits seguem o padrão Conventional Commits (commitlint)
  - Módulos NestJS por domínio/funcionalidade
  - DTOs com validação explícita via class-validator
  - Migrations versionadas via TypeORM
  - Variáveis de ambiente gerenciadas com dotenv + @nestjs/config
  - Docker Compose para ambiente de desenvolvimento local

rules:
  proposal:
    - Manter o contexto do domínio de bandas musicais
    - Especificar impacto em entidades do domínio (Banda, Membro, Música, Ensaio, Evento)
  tasks:
    - Dividir tarefas em incrementos de no máximo 2 horas
    - Incluir tarefa de migration quando houver mudança no banco de dados
    - Incluir tarefa de testes unitários e/ou e2e
